services:
  galleryd:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./sample-content:/data/content
      - gallery-cache:/data/cache
      - ./gollery.json:/etc/gollery/gollery.json:ro
      - ./users.json:/etc/gollery/users.json:ro
    environment:
      GOLLERY_POSTGRES_DSN: "postgres://gollery:gollery@postgres:5432/gollery?sslmode=disable"
      GOLLERY_SESSION_SECRET: "change-this-in-production"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gollery
      POSTGRES_PASSWORD: gollery
      POSTGRES_DB: gollery
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gollery"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gallery-cache:
  pgdata:
